aid: jpa
name: JPA
description: >-
  Java Persistence API (JPA) is a Java specification for managing relational
  data in Java applications. It provides an object-relational mapping (ORM)
  framework for mapping Java objects to database tables, enabling developers to
  interact with databases using Java objects rather than SQL.
